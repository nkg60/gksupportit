<article class="card gk-card" *transloco="let t">
  <div class="card__media">
    <img [src]="imageUrl()" [alt]="service().nom" loading="lazy" width="800" height="800" />
    <span class="card__badge gk-badge"><span class="gk-badge__check">✓</span> {{ t('hero.badge') }}</span>
  </div>

  <div class="card__body">
    <h3 class="card__title">{{ service().nom }}</h3>
    <p class="card__desc">{{ service().description }}</p>

    <div class="card__prices">
      <span class="card__price-market">
        <span class="card__price-label">{{ t('common.marketPrice') }}</span>
        <s>{{ service().prixMarche }}</s>
      </span>
      <span class="card__price-gk">
        <span class="card__price-label">{{ t('common.gkPrice') }}</span>
        <strong>{{ service().prixGK }}</strong>
      </span>
    </div>

    <a class="gk-btn gk-btn--whatsapp gk-btn--block" [href]="lien()" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="currentColor">
        <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.01c5.46 0 9.9-4.45 9.9-9.91C21.95 6.45 17.5 2 12.04 2Zm5.8 14.16c-.25.7-1.44 1.33-1.99 1.38-.53.05-.53.44-3.34-.7-2.82-1.14-4.6-4.02-4.74-4.21-.14-.19-1.13-1.5-1.13-2.86 0-1.36.71-2.03.96-2.31.25-.28.55-.35.73-.35.18 0 .37.002.53.01.17.007.4-.065.62.48.25.6.86 2.08.94 2.23.08.15.12.32.02.51-.09.19-.14.31-.28.48-.14.17-.29.37-.42.5-.14.14-.28.29-.12.57.16.28.72 1.19 1.55 1.93 1.06.95 1.96 1.24 2.24 1.38.28.14.44.12.61-.07.17-.19.7-.82.89-1.1.19-.28.37-.23.62-.14.25.09 1.6.75 1.87.89.28.14.46.21.53.32.07.11.07.65-.18 1.35Z"/>
      </svg>
      {{ t('common.chooseService') }}
    </a>
  </div>
</article>
