<ng-container *transloco="let t">
  <section class="gk-section--navy page-head">
    <div class="gk-container">
      <h1>{{ t('services.title') }}</h1>
      <p>{{ t('services.subtitle') }}</p>
    </div>
  </section>

  <section class="gk-section">
    <div class="gk-container">
      <div class="services-cta">
        <p>{{ t('services.notSure') }}</p>
        <a class="gk-btn gk-btn--primary" routerLink="/diagnostic">{{ t('services.doDiagnostic') }}</a>
      </div>

      @if (services().length) {
        <div class="services-grid">
          @for (s of services(); track s.id; let i = $index) {
            <gk-service-card [gkReveal]="i % 3" [service]="s" [whatsappNumber]="settings()?.whatsappNumber ?? ''" />
          }
        </div>
      } @else {
        <p class="services-empty">{{ t('services.empty') }}</p>
      }
    </div>
  </section>
</ng-container>
