<div class="adm-head">
  <h1>Paramètres du site</h1>
</div>

<div class="adm-card param-card">
  <form [formGroup]="form" (ngSubmit)="enregistrer()" novalidate>
    <div class="adm-grid2">
      <div class="adm-field">
        <label for="p-wa">Numéro WhatsApp (international, chiffres)</label>
        <input id="p-wa" type="text" formControlName="whatsappNumber" placeholder="15149736569" />
      </div>
      <div class="adm-field">
        <label for="p-wad">Affichage du numéro</label>
        <input id="p-wad" type="text" formControlName="whatsappDisplay" placeholder="+1 514 973 6569" />
      </div>
      <div class="adm-field">
        <label for="p-email">Courriel</label>
        <input id="p-email" type="email" formControlName="email" />
      </div>
      <div class="adm-field">
        <label for="p-cap">Capital de départ ($)</label>
        <input id="p-cap" type="number" step="0.01" formControlName="capitalDepart" />
      </div>
    </div>

    <div class="adm-field">
      <label for="p-horaires">Horaires</label>
      <input id="p-horaires" type="text" formControlName="horaires" />
    </div>

    <div class="adm-grid2">
      <div class="adm-field">
        <label for="p-zone">Zone de service</label>
        <input id="p-zone" type="text" formControlName="zoneService" />
      </div>
      <div class="adm-field">
        <label for="p-supp">Supplément hors zone</label>
        <input id="p-supp" type="text" formControlName="supplementHorsZone" />
      </div>
    </div>

    <div class="adm-field">
      <label for="p-about">Texte « À propos »</label>
      <textarea id="p-about" rows="5" formControlName="aboutText"></textarea>
    </div>

    <div class="param-footer">
      @if (succes()) { <span class="param-ok">✓ Paramètres enregistrés.</span> }
      <button type="submit" class="gk-btn gk-btn--primary" [disabled]="enregistrement() || chargement()">
        {{ enregistrement() ? 'Enregistrement…' : 'Enregistrer' }}
      </button>
    </div>
  </form>
</div>
